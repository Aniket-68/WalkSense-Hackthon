name: Frontend CI

on:
  push:
    paths:
      - "Frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "Frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm install

      - name: Lint frontend
        working-directory: Frontend
        run: npm run lint

      - name: Build frontend
        working-directory: Frontend
        run: npm run build
