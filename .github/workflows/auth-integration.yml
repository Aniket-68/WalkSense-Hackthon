name: Auth Integration Tests

on:
  push:
    paths:
      - "Backend/**"
      - ".github/workflows/auth-integration.yml"
  pull_request:
    paths:
      - "Backend/**"
      - ".github/workflows/auth-integration.yml"

jobs:
  auth-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install auth-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Backend/requirements-auth-tests.txt

      - name: Run auth integration tests
        working-directory: Backend
        run: python -m unittest discover -s tests -p 'test_auth_integration.py' -v
