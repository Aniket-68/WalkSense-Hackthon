name: AWS Secrets Test

on:
  push:
    branches:
      - prototype-test

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  BUNDLED_SECRET_NAME: walksense-hackathon-prototype

jobs:
  aws-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-secrets-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch secrets from AWS Secrets Manager
        shell: bash
        run: |
          set -euo pipefail

          SECRET_KEYS=(GEMINI_API_KEY DEEPGRAM_API_KEY CARTESIA_API_KEY MONGO_DB_API_KEY)

          # Preferred mode: one bundled JSON secret with key/value pairs.
          bundled_json="$(aws secretsmanager get-secret-value \
            --secret-id "${BUNDLED_SECRET_NAME}" \
            --query SecretString \
            --output text 2>/dev/null || true)"

          for secret_id in "${SECRET_KEYS[@]}"; do
            secret_value=""

            if [ -n "$bundled_json" ] && echo "$bundled_json" | jq -e . >/dev/null 2>&1; then
              secret_value="$(echo "$bundled_json" | jq -r --arg key "$secret_id" '.[$key] // empty')"
            fi

            # Fallback mode: one AWS secret per key.
            if [ -z "$secret_value" ]; then
              raw_secret="$(aws secretsmanager get-secret-value \
                --secret-id "$secret_id" \
                --query SecretString \
                --output text)"

              # Allow optional wrappers: {"KEY":"..."} / {"value":"..."} / {"secret":"..."}
              if echo "$raw_secret" | jq -e . >/dev/null 2>&1; then
                secret_value="$(echo "$raw_secret" | jq -r --arg key "$secret_id" '.[$key] // .value // .secret // empty')"
              else
                secret_value="$raw_secret"
              fi
            fi

            if [ -z "$secret_value" ] || [ "$secret_value" = "None" ]; then
              echo "Secret '$secret_id' is empty or missing (checked bundled and individual modes)" >&2
              exit 1
            fi

            echo "::add-mask::$secret_value"
            echo "$secret_id=$secret_value" >> "$GITHUB_ENV"
          done

      - name: Use secret in workflow
        run: |
          echo "AWS secrets loaded successfully"
          [ -n "${GEMINI_API_KEY}" ]
          [ -n "${DEEPGRAM_API_KEY}" ]
          [ -n "${CARTESIA_API_KEY}" ]
          [ -n "${MONGO_DB_API_KEY}" ]
