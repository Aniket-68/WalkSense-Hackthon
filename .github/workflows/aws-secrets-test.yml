name: AWS Secrets Test

on:
  push:
    branches:
      - prototype-test

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  aws-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-secrets-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch secrets from AWS Secrets Manager
        shell: bash
        run: |
          set -euo pipefail

          for secret_id in GEMINI_API_KEY DEEPGRAM_API_KEY CARTESIA_API_KEY MONGO_DB_API_KEY; do
            secret_value=$(aws secretsmanager get-secret-value \
              --secret-id "$secret_id" \
              --query SecretString \
              --output text)

            # Allow optional small JSON wrappers: {"KEY":"..."} / {"value":"..."} / {"secret":"..."}
            if echo "$secret_value" | jq -e . >/dev/null 2>&1; then
              parsed_value=$(echo "$secret_value" | jq -r --arg key "$secret_id" '.[$key] // .value // .secret // empty')
              if [ -n "$parsed_value" ]; then
                secret_value="$parsed_value"
              fi
            fi

            if [ -z "$secret_value" ] || [ "$secret_value" = "None" ]; then
              echo "Secret '$secret_id' is empty or missing" >&2
              exit 1
            fi

            echo "::add-mask::$secret_value"
            echo "$secret_id=$secret_value" >> "$GITHUB_ENV"
          done

      - name: Use secret in workflow
        run: |
          echo "AWS secrets loaded successfully"
          [ -n "${GEMINI_API_KEY}" ]
          [ -n "${DEEPGRAM_API_KEY}" ]
          [ -n "${CARTESIA_API_KEY}" ]
          [ -n "${MONGO_DB_API_KEY}" ]
