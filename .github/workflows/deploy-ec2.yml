name: WalkSense Deploy to EC2

on:
  push:
    branches: [prototype-test]
    paths:
      - "Backend/**"
      - "Frontend/**"
      - "docker-compose.yml"
      - "deploy/**"
      - ".github/workflows/deploy-ec2.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy on EC2"
        required: false
        default: "prototype-test"
      deploy_path:
        description: "Path on EC2 where the repo exists"
        required: false
        default: "/opt/WalkSense-Hackthon"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO: ${{ secrets.ECR_REPO }}
  APP_ENV: ${{ vars.APP_ENV || 'production' }}

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'prototype-test' }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/walksense-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG="$(echo "$GITHUB_SHA" | cut -c1-8)"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://${{ secrets.DOMAIN }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy on EC2 (Docker Compose)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR='${{ github.event.inputs.deploy_path || '/opt/WalkSense-Hackthon' }}'
            BRANCH='${{ github.event.inputs.branch || 'prototype-test' }}'
            AWS_REGION='${{ env.AWS_REGION }}'
            ECR_REGISTRY='${{ env.ECR_REGISTRY }}'
            APP_ENV='${{ env.APP_ENV }}'
            BACKEND_IMAGE='${{ needs.build-and-push.outputs.backend_image }}'
            FRONTEND_IMAGE='${{ needs.build-and-push.outputs.frontend_image }}'
            BACKEND_IMAGE="${BACKEND_IMAGE:-${ECR_REGISTRY}/${{ env.ECR_REPO }}:backend-latest}"
            FRONTEND_IMAGE="${FRONTEND_IMAGE:-${ECR_REGISTRY}/${{ env.ECR_REPO }}:frontend-latest}"

            if [ -z "$BACKEND_IMAGE" ] || [ -z "$FRONTEND_IMAGE" ]; then
              echo "Image references must not be empty"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone --branch "$BRANCH" https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            docker pull "$BACKEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"

            export APP_ENV BACKEND_IMAGE FRONTEND_IMAGE
            docker compose -f deploy/ec2/docker-compose.ec2.yml up -d --remove-orphans

            docker image prune -f
