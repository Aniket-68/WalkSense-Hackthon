name: WalkSense Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy on EC2"
        required: false
        default: "prototype-test"
      deploy_path:
        description: "Path on EC2 where the repo exists"
        required: false
        default: "/opt/WalkSense-Hackthon"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_IMAGE: walksense-backend
  FRONTEND_IMAGE: walksense-frontend
  APP_ENV: ${{ vars.APP_ENV || 'production' }}

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'prototype-test' }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/walksense-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: echo "image-tag=$(echo $GITHUB_SHA | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image-tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://${{ secrets.DOMAIN }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image-tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy on EC2 (Docker Compose)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR='${{ github.event.inputs.deploy_path || '/opt/WalkSense-Hackthon' }}'
            BRANCH='${{ github.event.inputs.branch || 'prototype-test' }}'
            AWS_REGION='${{ env.AWS_REGION }}'
            ECR_REGISTRY='${{ env.ECR_REGISTRY }}'
            IMAGE_TAG='${{ needs.build-and-push.outputs.image-tag }}'
            APP_ENV='${{ env.APP_ENV }}'

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone --branch "$BRANCH" https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            export ECR_REGISTRY IMAGE_TAG APP_ENV
            docker compose -f deploy/ec2/docker-compose.ec2.yml pull backend frontend
            docker compose -f deploy/ec2/docker-compose.ec2.yml up -d --remove-orphans

            docker image prune -f
