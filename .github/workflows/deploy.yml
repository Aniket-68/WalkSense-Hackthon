name: WalkSense CI/CD

on:
  push:
    branches: [prototype-test]
    paths:
      - "Backend/**"
      - "Frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO: ${{ secrets.ECR_REPO }}

jobs:
  # ──────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lint deps
        run: pip install ruff

      - name: Ruff lint
        run: ruff check Backend/API/ --select E,F,W --ignore E501

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Frontend lint
        run: |
          cd Frontend
          npm ci
          npm run lint

  # ──────────────────────────────────────────────
  # Build → Push to ECR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/prototype-test' && github.event_name == 'push'

    permissions:
      id-token: write   # OIDC → AWS
      contents: read

    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/walksense-github-actions
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate SHA tag
        id: meta
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:backend-${{ steps.meta.outputs.sha }}
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://${{ secrets.DOMAIN }}
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:frontend-${{ steps.meta.outputs.sha }}
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Deploy → EC2 via SSH (docker compose pull + up)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            REGISTRY="${{ secrets.ECR_REGISTRY }}"
            REPO="${{ secrets.ECR_REPO }}"
            REGION="${{ secrets.AWS_REGION }}"

            # 1. Authenticate EC2 to ECR (uses EC2 instance role — no credentials needed)
            aws ecr get-login-password --region "${REGION}" \
              | docker login --username AWS --password-stdin "${REGISTRY}"

            # 2. Pull latest images
            docker pull "${REGISTRY}/${REPO}:backend-latest"
            docker pull "${REGISTRY}/${REPO}:frontend-latest"

            # 3. Export image refs for docker-compose
            export BACKEND_IMAGE="${REGISTRY}/${REPO}:backend-latest"
            export FRONTEND_IMAGE="${REGISTRY}/${REPO}:frontend-latest"

            # 4. Restart containers (no build on EC2)
            cd ~/WalkSense-Hackthon
            docker compose up -d --no-build --remove-orphans

            # 5. Prune old images to free disk space
            docker image prune -f

            echo "✅ Deployed ${REGISTRY}/${REPO}:backend-latest"
            echo "✅ Deployed ${REGISTRY}/${REPO}:frontend-latest"
